plugin:
  name: easydb-export-transport-ftp-plugin
  version: 1.0
  server:
    api-version:
      require: 1
  webfrontend:
    url: easydb-export-transport-ftp.js
    l10n: l10n/

python-2:
  file: src/server/easydb-export-transport-ftp.py

base_config:
  - name: rclone
    group: export
    parameters:
      rclone_log_debug:
        type: bool
        default: false
        position: 0
