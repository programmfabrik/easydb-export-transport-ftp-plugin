plugin:
  name: easydb-export-transport-ftp-plugin
  version: 1.0
  server:
    api-version:
      require: 1
  webfrontend:
    url: easydb-export-transport-ftp.js
    l10n: l10n/

python-2:
  file: src/server/easydb-export-transport-ftp.py

base_config:
  - name: rclone
    group: export
    parameters:
      log_level:
        type: select
        label: rclone_log_level
        default: INFO
        options:
          - DEBUG
          - INFO
          - NOTICE
          - ERROR
        position: 0
